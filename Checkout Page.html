    <section>
        <h2>Payment Information</h2>
        <form method="POST" action="" id="checkout">
            <label for="card-name">Cardholder Name
                <span aria-hidden="true">*</span>
            </label>
            <input required id="card-name" name="card-name" type="text">
            <div>
            <label for="card-number">Card Number
                <span aria-hidden="true">*</span>
            </label>
            <input required id="card-number" name="card-number" type="text" minlength="12" maxlength="12" aria-describedby="card-number-help">
            <p id="card-number-help">Please enter your 16-digit card number.</p></div>
            <div>
            <label for="card-expiration">Valid Until
                <span aria-hidden="true">*</span>
            </label>

            <div>
            <label for="card-cvv">CVV
                <span aria-hidden="true">*</span>
            </label>
            <input required id="card-cvv" name="card-cvv" type="number" min="100" max="999"></div>
            <button id="submit">Submit</button>
        </form>
